spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/QLCayCanh
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # TỐI THIỂU 256-bit cho HS256. Nên đổi thành biến môi trường khi deploy.
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  expiration-minutes: 120
server:
  port: 8080